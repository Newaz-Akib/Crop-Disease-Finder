    <!DOCTYPE html>
    <html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Crop Disease Detection</title>
        <style>
            body {
                font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
                text-align: center;
                background-color: #f4f7f6;
                margin: 0;
                padding: 50px 20px;
            }
            .container {
                max-width: 500px;
                margin: 0 auto;
                background: white;
                padding: 30px;
                border-radius: 12px;
                box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            }
            h1 { color: #2c3e50; margin-bottom: 25px; }
            input[type="file"] { margin-bottom: 20px; }
            button {
                background-color: #2ecc71;
                color: white;
                border: none;
                padding: 10px 20px;
                font-size: 16px;
                border-radius: 6px;
                cursor: pointer;
                transition: 0.2s;
            }
            button:hover { background-color: #27ae60; }
            .result-box {
                margin-top: 30px;
                padding: 20px;
                background: #e8f8f5;
                border-radius: 8px;
                border: 1px solid #a3e4d7;
            }
            .result-box img {
                margin-top: 15px;
                border-radius: 8px;
                box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            }
        </style>
    </head>
    <body>

        <div class="container">
            <h1>🌿 Crop Disease Finder</h1>

            <form action="/predict" method="POST" enctype="multipart/form-data">
                <input type="file" name="file" accept="image/*" required><br>
                <button type="submit">Analyze Image</button>
            </form>

            {% if prediction %}
                <div class="result-box">
                    <h3>Detected Status:</h3>
                    <h2 style="color: #27ae60; margin: 5px 0;">{{ prediction }}</h2>
                    <img src="{{ image_path }}" width="100%" alt="Crop Image">
                </div>
            {% endif %}
        </div>

    </body>
    </html>
